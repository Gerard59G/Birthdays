<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Birthdays">
<meta name="theme-color" content="#faf7f2">
<title>🎂 Birthday Recall 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#faf7f2; --sur:#f2ece0; --sur2:#e8dfc8;
  --ink:#1c1409; --ink2:#5a4a35; --ink3:#8a7a65;
  --acc:#c4623a; --acc2:#e8937a;
  --bdr:#ddd0bb; --shd:rgba(28,20,9,.08);
  --green:#4e7a52; --amber:#a06825; --slate:#6b5c48;
  /* CORRECTIF POUR TON TÉLÉPHONE ICI */
  --sb: env(safe-area-inset-bottom, 20px);
  --st: env(safe-area-inset-top, 0px);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --nav-h: 65px;
}

html,body{height:100%;background:var(--bg);overflow:hidden;position:fixed;width:100%;}
body{font-family:var(--sans);color:var(--ink);-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;}

#shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;}
#safe-top{background:var(--bg);height:var(--st);flex-shrink:0}

#hdr{padding:13px 18px 11px;border-bottom:1px solid var(--bdr);background:rgba(250,247,242,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
#hdr-title{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink)}
#hdr-sub{font-size:11.5px;color:var(--ink3);margin-top:2px}

#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;position:relative}

/* NAVIGATION DU BAS AJUSTÉE POUR TON ÉCRAN */
#nav{
  display:flex;border-top:1px solid var(--bdr);
  background:rgba(250,247,242,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding-bottom: var(--sb);
  height: calc(var(--nav-h) + var(--sb));
  flex-shrink:0;
}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;touch-action:manipulation;color:var(--ink3);transition:color .15s;padding-top:10px;}
.nb.on{color:var(--acc)}
.nb-icon{font-size:21px;line-height:1}
.nb-lbl{font-size:10px;font-weight:500;letter-spacing:.02em}

.page{padding:18px 16px 32px}
.tab{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab.on{display:block}
.pv{display:none}
.pv.on{display:block}

.sec{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink);margin-bottom:14px}
.eyebrow{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3)}

.surface{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:20px;box-shadow:0 2px 14px var(--shd);}
.stat-row{margin-bottom:17px}
.stat-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stat-name{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:500;color:var(--ink2)}
.stat-val{font-size:14px;font-weight:700}
.bar-t{height:6px;border-radius:3px;background:#ede5d5;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1)}

.up-item{display:flex;align-items:center;gap:13px;padding:12px 14px;background:#fff;border:1px solid var(--bdr);border-radius:13px;margin-bottom:9px;}
.av{width:40px;height:40px;border-radius:50%;background:var(--sur);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--ink2);flex-shrink:0;}
.up-name{font-size:14.5px;font-weight:500;color:var(--ink)}
.up-date{font-size:12.5px;color:var(--ink3);margin-top:2px}
.soon{margin-left:auto;flex-shrink:0;background:#fdf3e7;border:1px solid #e5c97a;color:#a06825;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.mc{background:#fff;border:1.5px solid var(--bdr);border-radius:14px;padding:18px 14px;cursor:pointer;touch-action:manipulation;text-align:left;width:100%;}
.mc.off{opacity:.42;pointer-events:none}
.mc-icon{font-size:26px;margin-bottom:10px}
.mc-title{font-family:var(--serif);font-size:14.5px;font-weight:700;color:var(--ink);margin-bottom:4px}
.mc-sub{font-size:11.5px;color:var(--ink3);line-height:1.45}
.mc-due{font-size:12px;font-weight:500;color:var(--acc);margin-top:9px}

/* FLASHCARD LOGIC ORIGINALE */
#tcv{display:flex;flex-direction:column;min-height:calc(100vh - 150px)}
.prog-wrap{flex-shrink:0;padding:14px 16px 0}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:6px}
.prog-t{height:4px;background:#ede5d5;border-radius:2px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc),#d4913a);transition:width .4s ease}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-height:220px;}
.flip-wrap{perspective:1100px;width:100%;height:216px;cursor:pointer}
.fi{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;-webkit-transform-style:preserve-3d;}
.fi.flipped{transform:rotateY(180deg)}
.ff{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px;}
.ff-front{background:#fff;border:1.5px solid var(--bdr);box-shadow:0 6px 28px var(--shd)}
.ff-back{transform:rotateY(180deg);background:#fffcfa;border:1.5px solid #e8c0a0;box-shadow:0 6px 28px var(--shd)}
.card-big{font-family:var(--serif);font-size:42px;font-weight:700;text-align:center;line-height:1.1}
.card-hint{font-size:12.5px;color:var(--ink3);margin-top:18px}
.act{flex-shrink:0;padding:0 16px 18px}
.show-btn{width:100%;padding:15px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;font-family:var(--sans);}
.rat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rb{border-radius:10px;border:1.5px solid;padding:10px 3px;cursor:pointer;text-align:center;}
.rb-lbl{font-size:13.5px;font-weight:700;display:block}

.cl-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--bdr);border-radius:13px;padding:13px 14px;margin-bottom:10px;}
.cl-info{flex:1;min-width:0}
.cl-name{font-size:15px;font-weight:600;color:var(--ink)}
.cl-bday{font-size:12.5px;color:var(--ink3);margin-top:2px}
.ib{width:34px;height:34px;border-radius:9px;border:1px solid var(--bdr);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.ib.del{border-color:#e8b8b8;color:#b03535}

#fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + var(--sb) + 14px);width:56px;height:56px;border-radius:28px;background:var(--acc);color:#fff;border:none;box-shadow:0 4px 18px rgba(196,98,58,.42);display:none;align-items:center;justify-content:center;z-index:20;font-size:28px;}
#form-overlay{position:absolute;inset:0;background:var(--bg);overflow-y:auto;z-index:30;display:none;padding-top:var(--st);}
.fo-head{display:flex;align-items:center;gap:14px;padding:16px 16px 0;margin-bottom:22px;}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:none;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--ink2);}
.form-inner{padding:0 16px 60px}
.fg{margin-bottom:18px}
.flbl{font-size:13px;font-weight:500;color:var(--ink2);display:block;margin-bottom:7px}
.fi-t, .fi-sel{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);border:1.5px solid var(--bdr);border-radius:10px;padding:12px 14px;background:#fff;outline:none;-webkit-appearance:none;}
.fi-row{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.pri-btn{width:100%;padding:15px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;font-family:var(--sans);}
</style>
</head>
<body>
<div id="shell">
  <div id="safe-top"></div>
  <header id="hdr">
    <div>
      <div id="hdr-title">🎂 Birthday Recall</div>
      <div id="hdr-sub"></div>
    </div>
  </header>
  <div id="content">
    <div id="tab-home" class="tab on"><div class="page"><div class="surface" id="stats-el" style="margin-bottom:20px"></div><div class="sec">🗓 Coming Up</div><div id="upcoming-el"></div></div></div>
    <div id="tab-train" class="tab"><div id="ts" class="pv"><div class="page"><div class="sec">Choose Mode</div><div class="mode-grid"><button class="mc" id="mc1" onclick="startTrain('nameToDate')"><div class="mc-icon">👤→📅</div><div class="mc-title">Name → Date</div><div class="mc-sub">Recall the birthday</div><div class="mc-due" id="due1"></div></button><button class="mc" id="mc2" onclick="startTrain('dateToName')"><div class="mc-icon">📅→👤</div><div class="mc-title">Date → Name</div><div class="mc-sub">Recall the person</div><div class="mc-due" id="due2"></div></button></div><div id="no-due" style="display:none;text-align:center;color:var(--ink3)">🎉 All caught up!</div></div></div><div id="tcv" class="pv"><div class="prog-wrap"><div class="prog-meta"><span id="pm-lbl"></span><span id="pm-cnt"></span></div><div class="prog-t"><div class="prog-f" id="prog-f" style="width:0%"></div></div></div><div class="card-area"><div class="flip-wrap" onclick="flipCard()"><div class="fi" id="fi"><div class="ff ff-front"><div class="eyebrow" id="front-ey" style="margin-bottom:14px"></div><div class="card-big" id="front-main"></div><div class="card-hint">tap to reveal →</div></div><div class="ff ff-back"><div class="eyebrow" style="color:#c9853a;margin-bottom:14px">Answer</div><div class="card-big" id="back-main"></div></div></div></div></div><div id="act-show" class="act"><button class="show-btn" onclick="flipCard()">Show Answer</button></div><div id="act-rate" class="act" style="display:none"><div class="rat-grid"><button class="rb" style="border-color:#e8a8a8;background:#fff3f3;color:#b03535" onclick="rateCard('again')"><span class="rb-lbl">Again</span></button><button class="rb" style="border-color:#e5c680;background:#fff8ef;color:#a06025" onclick="rateCard('hard')"><span class="rb-lbl">Hard</span></button><button class="rb" style="border-color:#9ab8e0;background:#eef4fc;color:#2a6aad" onclick="rateCard('good')"><span class="rb-lbl">Good</span></button><button class="rb" style="border-color:#9ecfac;background:#eef6f0;color:#3a7250" onclick="rateCard('easy')"><span class="rb-lbl">Easy</span></button></div></div></div></div>
    <div id="tab-cards" class="tab"><div class="page" style="padding-bottom:80px"><div id="cards-el"></div></div></div>
  </div>
  <div id="form-overlay"><div class="fo-head"><button class="back-btn" onclick="closeForm()">←</button><div class="sec" id="form-title">Add Birthday</div></div><div class="form-inner"><div class="fg"><label class="flbl">Name</label><input class="fi-t" id="f-name" type="text" autocomplete="off"></div><div class="fg"><label class="flbl">Birthday</label><div class="fi-row"><select class="fi-sel" id="f-month"><option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option></select><input class="fi-t" id="f-day" type="number" min="1" max="31" placeholder="Day"></div></div><button class="pri-btn" id="save-btn" onclick="saveCard()">Add Birthday</button></div></div>
  <nav id="nav">
    <button class="nb on" id="nb-home" onclick="goTab('home')"><span class="nb-icon">🏠</span><span class="nb-lbl">Home</span></button>
    <button class="nb" id="nb-train" onclick="goTab('train')"><span class="nb-icon">🎯</span><span class="nb-lbl">Train</span></button>
    <button class="nb" id="nb-cards" onclick="goTab('cards')"><span class="nb-icon">🗂️</span><span class="nb-lbl">Cards</span></button>
  </nav>
</div>
<button id="fab" onclick="openForm()">+</button>

<script>
/* TON CODE JAVASCRIPT ORIGINAL COMPLET */
const KEY='br_storage_v1';
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let cards=[], tab='home', editId=null;
let TR={mode:null,queue:[],qi:0,flipped:false};

function today(){return new Date().toISOString().split('T')[0]}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function fmt(mmdd){if(!mmdd)return'?';const[m,d]=mmdd.split('-').map(Number);return MS[m-1]+' '+d}
function due(){return cards.filter(c=>c.nextReview<=today())}
function save(){localStorage.setItem(KEY, JSON.stringify(cards));}
function load(){const s=localStorage.getItem(KEY);cards=s?JSON.parse(s):[];}

function applyRating(c,r){
  let ease=c.ease||2.5,interval=c.interval||0,ni,ne=ease;
  if(interval===0){ni=r==='again'?0:r==='easy'?4:1}
  else if(r==='again'){ni=1;ne=Math.max(1.3,ease-.2)}
  else if(r==='hard'){ni=Math.max(1,Math.round(interval*1.2));ne=Math.max(1.3,ease-.15)}
  else if(r==='good'){ni=Math.max(1,Math.round(interval*ease))}
  else{ni=Math.max(4,Math.round(interval*ease*1.3));ne=Math.min(2.5,ease+.15)}
  return{...c,ease:ne,interval:ni,nextReview:addDays(ni||0),status:ni>=21?'mastered':'learning'};
}

function goTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('nb-'+t).classList.add('on');
  document.getElementById('fab').style.display=t==='cards'?'flex':'none';
  if(t==='home')renderHome(); if(t==='train')showTS(); if(t==='cards')renderCards();
}

function renderHome(){
  const s={m:cards.filter(c=>c.interval>=21).length, t:cards.length};
  document.getElementById('stats-el').innerHTML=`<div class="stat-row"><div class="stat-meta"><span class="stat-name">⭐ Mastered</span><span class="stat-val">${s.m}/${s.t}</span></div><div class="bar-t"><div class="bar-f" style="width:${s.t?(s.m/s.t*100):0}%"></div></div></div>`;
  document.getElementById('upcoming-el').innerHTML=cards.length ? cards.slice(0,5).map(c=>`<div class="up-item"><div class="av">${c.name[0]}</div><div><div class="up-name">${c.name}</div><div class="up-date">🎂 ${fmt(c.birthday)}</div></div></div>`).join('') : 'No cards.';
}

function showTS(){
  document.querySelectorAll('#tab-train .pv').forEach(e=>e.style.display='none');
  document.getElementById('ts').style.display='block';
  const d=due().length;
  document.getElementById('mc1').classList.toggle('off',d===0);
  document.getElementById('mc2').classList.toggle('off',d===0);
  document.getElementById('no-due').style.display=d===0?'block':'none';
}

function startTrain(mode){
  TR={mode,queue:[...due()].sort(()=>Math.random()-.5),qi:0,flipped:false};
  if(TR.queue.length) { document.getElementById('ts').style.display='none'; document.getElementById('tcv').style.display='flex'; renderCard(); }
}

function renderCard(){
  const c=TR.queue[TR.qi];
  document.getElementById('pm-cnt').textContent=`${TR.qi+1}/${TR.queue.length}`;
  document.getElementById('prog-f').style.width=`${(TR.qi/TR.queue.length*100)}%`;
  document.getElementById('front-main').textContent=TR.mode==='nameToDate'?c.name:fmt(c.birthday);
  document.getElementById('back-main').textContent=TR.mode==='nameToDate'?fmt(c.birthday):c.name;
  document.getElementById('fi').classList.toggle('flipped',TR.flipped);
  document.getElementById('act-show').style.display=TR.flipped?'none':'block';
  document.getElementById('act-rate').style.display=TR.flipped?'block':'none';
}

function flipCard(){TR.flipped=true;renderCard()}
function rateCard(r){
  const c=TR.queue[TR.qi];
  cards=cards.map(x=>x.id===c.id?applyRating(x,r):x);
  save(); TR.qi++; TR.flipped=false;
  if(TR.qi>=TR.queue.length) showTS(); else renderCard();
}

function renderCards(){
  document.getElementById('cards-el').innerHTML=cards.map(c=>`<div class="cl-item"><div class="cl-info"><div class="cl-name">${c.name}</div><div class="cl-bday">🎂 ${fmt(c.birthday)}</div></div><button class="ib del" onclick="delCard('${c.id}')">✕</button></div>`).join('');
}

function openForm(){document.getElementById('form-overlay').style.display='block';}
function closeForm(){document.getElementById('form-overlay').style.display='none';}
function saveCard(){
  const name=document.getElementById('f-name').value;
  const mmdd=`${document.getElementById('f-month').value}-${document.getElementById('f-day').value.padStart(2,'0')}`;
  if(!name)return;
  cards.push({id:Date.now().toString(),name,birthday:mmdd,ease:2.5,interval:0,nextReview:today()});
  save(); closeForm(); renderCards();
}
function delCard(id){cards=cards.filter(c=>c.id!==id);save();renderCards();}

load(); goTab('home');
</script>
</body>
</html>
